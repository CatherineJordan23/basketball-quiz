<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title> What basketball Player are you?</title>
    <link rel="icon" type="image/x-icon" href="/img/ideas.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href ="./css/style.css">
</head>
<body>
    <h1 class="text-center mt-4">What basketball Player are you? 🏀</h1>
    
    <!-- Question 1 -->
  <div class="question-block mt-4" id ="question-1">
    <h4>1. What's your play style?</h4>
    <button class="btn btn-outline-primary answer-btn" data-points="3">Shooting</button>
    <button class="btn btn-outline-primary answer-btn" data-points="2">Defense</button>
  </div>

  <!-- Question 2 -->
  <div class="question-block mt-4" id="question-2">
    <h4>2. What’s your strength?</h4>
    <button class="btn btn-outline-primary answer-btn" data-points="3">Scoring</button>
    <button class="btn btn-outline-primary answer-btn" data-points="1">Teamwork</button>
  </div>

  <!-- Question 3 -->
  <div class="question-block mt-4" id="question-3">
    <h4>3. How do you handle pressure?</h4>
    <button class="btn btn-outline-primary answer-btn" data-points="3">Take the last shot</button>
    <button class="btn btn-outline-primary answer-btn" data-points="1">Pass to teammate</button>
  </div>

  <!-- Result Button -->
  <button id="result-btn" class="btn btn-success mt-4">Give Me My Result</button>

  <!-- Result Display -->
  <div id="result-container" class="mt-4"></div>

</div>
    
    <!-- Connect to your script file here -->
     <script src = "./js/script.js"></script>
</body>
</html>
